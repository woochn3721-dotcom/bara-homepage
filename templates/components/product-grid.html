<!--
  인기/추천 상품 카드 그리드 컴포넌트
  - 모바일 1열 → 데스크톱 4열
  - 카드 하나가 상품 1개. 필요한 만큼 .product-card를 복사해서 늘리세요
  - 구매 버튼 href는 스마트스토어/쿠팡 등 외부 상품 URL로 교체
-->
<section id="products" class="product-section">
  <div class="section-label">PRODUCTS</div>
  <div class="section-title">인기 상품</div>
  <div class="product-grid">

    <div class="product-card">
      <div class="product-image-placeholder">여기에 상품 사진을 넣으세요</div>
      <div class="product-info">
        <div class="product-name">[상품명]</div>
        <div class="product-price">[가격]</div>
        <a href="#" class="product-buy" target="_blank" rel="noopener">구매하기</a>
      </div>
    </div>

  </div>
</section>
